<div class="mt-4 ml-4 flex justify-between items-center">
    <div>
        <span class="text-2xl text-start">{{ title }}</span>
    </div>
    <div class="mr-4">
        <mat-icon class="cursor-pointer" (click)="onClose()">close</mat-icon>
    </div>
</div>
<main class="grid grid-cols-12 mt-5">
    <section class="col-span-12">
        <div class="container mx-auto px-4 h-full">
            <div class="flex h-full">
                <div class="w-full px-4">
                    <div class="relative flex flex-col min-w-0 break-words w-full mb-6 shadow-lg rounded-lg border-0">
                        <div class="flex-auto px-4 lg:px-10 py-10 pt-0">
                            <form>
                                <div class="relative w-full mb-3">
                                    <label class="block uppercase text-gray-700 text-xs font-bold mb-2"
                                        for="grid-password">ICD10 Code</label>
                                    <input type="text"
                                        class="border-0 px-3 py-3 placeholder-gray-400 text-gray-700 bg-white rounded text-sm shadow focus:outline-none focus:ring w-full"
                                        placeholder="Name" style="transition: all 0.15s ease 0s;"
                                        name="username" />
                                </div>
                                <div class="relative w-full mb-3">
                                    <label class="block uppercase text-gray-700 text-xs font-bold mb-2"
                                        for="grid-password">Description</label>
                                    <input type="text"
                                        class="border-0 px-3 py-3 placeholder-gray-400 text-gray-700 bg-white rounded text-sm shadow focus:outline-none focus:ring w-full"
                                        placeholder="Password" style="transition: all 0.15s ease 0s;" name="description"
                                         />
                                </div>
                                <div class="relative w-full mb-3">
                                    <app-searchable-select-for-objects
                                        [label]="'ICD10 Category'"
                                        [items]="[]"
                                        [placeholder]="'Select ICD10 Category'"
                                        [value_as_tooltip]="true"
                                    ></app-searchable-select-for-objects>
                                </div>
                                <div class="text-center mt-6">
                                    <button
                                        class="bg-blue-600 text-white active:bg-blue-600 text-sm font-bold uppercase px-6 py-3 rounded shadow hover:shadow-lg outline-none focus:outline-none mr-1 mb-1 w-full"
                                        type="button" style="transition: all 0.15s ease 0s;">
                                        Save
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>
